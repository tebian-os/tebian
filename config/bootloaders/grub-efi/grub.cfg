set default=0
set timeout=5

# Filesystem and partition modules
insmod part_gpt
insmod part_msdos
insmod fat
insmod ext2
insmod iso9660
insmod loopback

# Graphics
insmod all_video
insmod gfxterm
insmod png
if loadfont /boot/grub/unicode.pf2; then
    set gfxmode=auto
    terminal_output gfxterm
fi

if [ -e /boot/grub/live-theme/theme.txt ]; then
    set theme=/boot/grub/live-theme/theme.txt
fi

# Kernel paths (@@KERNEL_VERSION@@ replaced at build time)
set kern=/live/vmlinuz-@@KERNEL_VERSION@@
set init=/live/initrd.img-@@KERNEL_VERSION@@

# Load the right kernel module for the platform
if [ "$grub_platform" = "efi" ]; then
    insmod linuxefi
else
    insmod linux
fi

# Only search for root if not already set (Ventoy/loopback sets root for us)
if [ -z "$root" ] || ! [ -e /live/filesystem.squashfs ]; then
    search --set=root --file /live/filesystem.squashfs
fi

# Detect boot context for live-boot findiso support
set extra=""
if [ -n "$iso_path" ]; then
    set extra="findiso=$iso_path"
fi

menuentry "Tebian OS" {
    set gfxpayload=keep
    linux $kern boot=live components toram quiet splash loglevel=0 vt.global_cursor_default=0 cfg80211.ieee80211_regdom=00 $extra
    initrd $init
}

menuentry "Tebian OS (safe graphics)" {
    set gfxpayload=keep
    linux $kern boot=live components toram nomodeset cfg80211.ieee80211_regdom=00 $extra
    initrd $init
}
